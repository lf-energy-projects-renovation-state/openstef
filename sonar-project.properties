# Exclude generated Jupyter notebooks and example/figure scripts from SonarQube
# analysis. .ipynb files are generated from paired .py jupytext sources;
# analysing both is redundant. Tutorial, benchmark, and figure-generator .py
# files are interactive notebook-style scripts (jupytext py:percent), not
# library code. SonarQube flags patterns like user-toggles
# (USE_MLFLOW_STORAGE = False; if USE_MLFLOW_STORAGE) as "constant expressions",
# which are false positives for configurable notebook cells.
sonar.exclusions=**/*.ipynb,examples/tutorials/*.py,examples/benchmarks/**/*.py,docs/source/tutorials/**,docs/source/benchmarks/**,docs/source/_figures/*.py

# Target Python version for precise analysis.
sonar.python.version=3.12

# Exclude expected duplication.
# - Tests: fixtures, helpers and parametrized patterns are intentionally repetitive.
# - LGBM / LGBMLinear forecasters: the two estimators share near-identical
#   fit/predict/explain plumbing but are deliberately kept as separate, self-contained
#   classes for readability and independent evolution; the duplication is accepted.
# - forecasting_workflow presets (openstef-models & openstef-meta): the meta preset
#   intentionally mirrors the models preset's config field definitions so each package
#   stays standalone; sharing the code would couple the packages, so we accept the overlap.
sonar.cpd.exclusions=**/tests/**/*.py,packages/openstef-models/src/openstef_models/models/forecasting/lgbm_forecaster.py,packages/openstef-models/src/openstef_models/models/forecasting/lgbmlinear_forecaster.py,packages/openstef-models/src/openstef_models/presets/forecasting_workflow.py,packages/openstef-meta/src/openstef_meta/presets/forecasting_workflow.py

# Project identity on SonarCloud.
sonar.projectKey=OpenSTEF_openstef
sonar.organization=openstef

# Coverage report produced by `poe tests` (pytest-cov, --cov-report=xml:coverage.xml).
# Required for the coverage metric/badge: Automatic Analysis cannot import coverage,
# so this is only consumed by the CI-based scan (see .github/workflows/_job_quality_check.yaml).
sonar.python.coverage.reportPaths=coverage.xml

# Source roots. Must match the layout used in coverage.xml so SonarCloud can
# resolve the coverage `filename` paths (e.g. openstef_beam/__init__.py).
# Without this, sources default to the repo root and coverage import matches 0 files.
sonar.sources=packages/openstef-beam/src,packages/openstef-core/src,packages/openstef-meta/src,packages/openstef-models/src

# Tests live in per-package tests/ dirs; tell Sonar where to find them.
sonar.tests=packages/openstef-beam/tests,packages/openstef-core/tests,packages/openstef-meta/tests,packages/openstef-models/tests
sonar.test.inclusions=**/tests/**/*.py
