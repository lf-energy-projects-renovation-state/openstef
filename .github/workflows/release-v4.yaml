name: Release V4
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v4.1.0 or 4.1.0). Prefixing with v is optional.'
        required: true
        default: ""

permissions:
  contents: read

jobs:
  quality:
    if: ${{ startsWith(github.ref, 'refs/tags/v4.') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.version, 'v4')) }}
    name: Quality Checks
    uses: ./.github/workflows/_job_quality_check.yaml

  release-pypi:
    name: Release PyPI Package
    needs: quality
    runs-on: ubuntu-latest
    environment: release
    if: ${{ (startsWith(github.ref, 'refs/tags/v4.') || (github.event_name == 'workflow_dispatch' && startsWith(github.event.inputs.version, 'v4'))) && needs.quality.result == 'success' }}
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing and keyless signing
      id-token: write
      # Required to attach signed artifacts/bundles to the GitHub Release
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          show-progress: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          activate-environment: true
          enable-cache: true
      - name: Install build dependencies
        run: uv sync --frozen --no-install-project --no-default-groups --group build

      # Start of release steps
      - name: Set version from release
        id: ver
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          # Prefer release payload tag_name, otherwise fallback to the workflow_dispatch input
          if [ -n "$RELEASE_TAG" ]; then
            VERSION="$RELEASE_TAG"
          elif [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            # As a last-resort fallback, try to get the ref tag from GITHUB_REF
            if [[ "$GITHUB_REF" == refs/tags/* ]]; then
              VERSION="${GITHUB_REF#refs/tags/}"
            else
              echo "No version provided via release or workflow input, aborting"
              exit 1
            fi
          fi
          # Remove leading 'v' if present
          VERSION="${VERSION#v}"
          echo "Release version: $VERSION"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Apply version
        run: poe version --version "${{ steps.ver.outputs.version }}"
      - name: Build all packages
        run: poe build
      - name: Sign distributions (PEP 740 attestations, keyless OIDC)
        run: uv run --no-sync pypi-attestations sign dist/*.whl dist/*.tar.gz
      - name: Publish packages
        # uv uploads the matching *.publish.attestation alongside each distribution
        run: uv publish --trusted-publishing always
      - name: Sign distributions (Sigstore bundles for offline verification)
        run: uv run --no-sync sigstore sign dist/*.whl dist/*.tar.gz
      - name: Attach signed artifacts to the GitHub Release
        if: ${{ github.event_name == 'release' }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$TAG" dist/*.whl dist/*.tar.gz dist/*.sigstore.json --clobber
      - name: Summary
        run: echo "Published and signed version ${{ steps.ver.outputs.version }}"
